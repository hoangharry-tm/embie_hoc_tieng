[build]
command = "npm run build"
publish = ".output/public"

[functions]
directory = ".output/server"

[dev]
command = "npm run dev"
targetPort = 3000
port = 8888

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/server"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
